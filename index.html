<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Score Master Detail</title>
    <style>
        :root { --bg: #0e1117; --card: #262730; --primary: #ff4b4b; --text: #fafafa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        /* Sidebar & Sidebar UI */
        #sidebar { position: fixed; left: -280px; top: 0; width: 250px; height: 100%; background: var(--card); border-right: 1px solid #444; transition: 0.3s; padding: 15px; z-index: 1000; overflow-y: auto; }
        #sidebar.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        
        /* Grid & Cards */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; }
        .card { background: var(--card); border: 1px solid #444; border-radius: 8px; padding: 6px; text-align: center; position: relative; }
        
        .name { font-size: 11px; font-weight: bold; color: var(--primary); text-transform: uppercase; margin-bottom: 2px; height: 14px; overflow: hidden; }
        .score { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        
        /* Controls */
        .controls { display: flex; gap: 3px; margin-bottom: 6px; }
        button { border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; }
        .btn-plus { background: #2e7d32; flex: 1; padding: 10px 0; }
        .btn-minus { background: #c62828; flex: 1; padding: 10px 0; }
        .btn-log { background: #444; font-size: 10px; padding: 2px 5px; margin-top: 5px; width: 100%; opacity: 0.8; }
        
        input[type="number"] { width: 85%; background: #0e1117; border: 1px solid #444; color: white; text-align: center; padding: 4px; border-radius: 4px; font-size: 11px; }

        /* Individuel Logs (Pliable) */
        .player-history { font-size: 10px; color: #888; margin-top: 5px; max-height: 50px; overflow-y: auto; display: none; border-top: 1px dashed #444; padding-top: 3px; }
        .player-history.show { display: block; }
        
        /* Global Log */
        .history-section { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
        #log-list { list-style: none; padding: 0; margin: 0; font-size: 11px; color: #bbb; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>⚙️ Configuration</h3>
        <label style="font-size:12px;">Joueurs :</label>
        <input type="number" id="nb-input" min="1" max="24" style="width:50px; margin-bottom:15px;">
        <div id="names-editor"></div>
        <button style="background:var(--primary); width:100%; padding:10px; margin-top:10px;" onclick="toggleSidebar()">Appliquer</button>
        <button style="background:#444; width:100%; padding:10px; margin-top:10px;" onclick="resetAll()">🗑️ Reset Complet</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="header">
        <button style="background:transparent; font-size:24px; color:white;" onclick="toggleSidebar()">☰</button>
        <h2 style="color:var(--primary); font-size:18px; margin:0;">SCORE MASTER</h2>
        <div style="width:30px;"></div>
    </div>

    <div id="player-grid" class="grid"></div>

    <div class="history-section">
        <div style="font-size: 12px; color: #888; margin-bottom: 5px;">🕒 Historique Global</div>
        <ul id="log-list"></ul>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('scoreStateV2')) || {
            players: [
                { id: 0, name: "J1", score: 0, history: [] },
                { id: 1, name: "J2", score: 0, history: [] },
                { id: 2, name: "J3", score: 0, history: [] },
                { id: 3, name: "J4", score: 0, history: [] }
            ],
            globalLogs: []
        };

        function save() { localStorage.setItem('scoreStateV2', JSON.stringify(state)); }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('open');
            document.getElementById('overlay').style.display = sb.classList.contains('open') ? 'block' : 'none';
            if(sb.classList.contains('open')) renderConfig();
        }

        function updateScore(id, pts) {
            if (!pts || isNaN(pts)) return;
            const p = state.players.find(p => p.id === id);
            p.score += pts;
            
            const entry = `${pts > 0 ? '+' : ''}${pts}`;
            p.history.unshift(entry); // Ajout historique joueur
            
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            state.globalLogs.unshift(`${time} | ${p.name} (${entry})`);
            if (state.globalLogs.length > 5) state.globalLogs.pop();
            
            save(); render();
        }

        function togglePlayerLog(id) {
            const el = document.getElementById(`log-p-${id}`);
            el.classList.toggle('show');
        }

        function render() {
            const grid = document.getElementById('player-grid');
            grid.innerHTML = '';
            state.players.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="name">${p.name}</div>
                    <div class="score">${p.score}</div>
                    <div class="controls">
                        <button class="btn-plus" onclick="updateScore(${p.id}, 1)">+</button>
                        <button class="btn-minus" onclick="updateScore(${p.id}, -1)">-</button>
                    </div>
                    <input type="number" placeholder="Pts" onchange="updateScore(${p.id}, parseInt(this.value)); this.value=''">
                    <button class="btn-log" onclick="togglePlayerLog(${p.id})">📜 Détails</button>
                    <div id="log-p-${p.id}" class="player-history">${p.history.join(', ') || 'Vide'}</div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('log-list').innerHTML = state.globalLogs.map(l => `<li>${l}</li>`).join('');
        }

        function renderConfig() {
            const container = document.getElementById('names-editor');
            const nbInput = document.getElementById('nb-input');
            nbInput.value = state.players.length;
            container.innerHTML = '';
            state.players.forEach((p, i) => {
                const input = document.createElement('input');
                input.type = 'text'; input.value = p.name;
                input.style = "width:90%; margin-bottom:5px; padding:5px; background:#0e1117; border:1px solid #444; color:white; border-radius:4px;";
                input.oninput = (e) => { state.players[i].name = e.target.value; save(); render(); };
                container.appendChild(input);
            });
            nbInput.onchange = (e) => {
                const val = parseInt(e.target.value);
                if (val > state.players.length) {
                    for(let i=state.players.length; i<val; i++) state.players.push({id: i, name: `J${i+1}`, score:0, history:[]});
                } else { state.players = state.players.slice(0, val); }
                save(); render(); renderConfig();
            };
        }

        function resetAll() {
            if(confirm("Tout effacer ?")) {
                state.players.forEach(p => { p.score = 0; p.history = []; });
                state.globalLogs = [];
                save(); render(); toggleSidebar();
            }
        }

        render();
    </script>
</body>
</html>
